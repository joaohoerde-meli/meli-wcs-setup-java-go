version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: wcs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wcs_db
      MYSQL_USER: wcs_user
      MYSQL_PASSWORD: wcs_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  java-service:
    build:
      context: ./java-service
      dockerfile: Dockerfile
    container_name: wcs-java-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wcs_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: wcs_user
      SPRING_DATASOURCE_PASSWORD: wcs_pass
      SPRING_PROFILES_ACTIVE: ${SCOPE:-development}
      # ── OpenTelemetry (Java Agent auto-instrumentation) ──────────────────
      # The agent reads these standard env vars automatically.
      # OTEL_EXPORTER_OTLP_ENDPOINT points to your OTel Collector or Datadog agent.
      OTEL_SERVICE_NAME: wcs-java-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_COLLECTOR_URL:-http://localhost:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${SCOPE:-development}
      # Disable noisy instrumentation not relevant to this service:
      OTEL_INSTRUMENTATION_SPRING_WEBMVC_ENABLED: "true"
      OTEL_INSTRUMENTATION_JDBC_ENABLED: "true"
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  go-service:
    build:
      context: ./go-service
      dockerfile: Dockerfile
    container_name: wcs-go-service
    ports:
      - "8080:8080"
    environment:
      JAVA_SERVICE_URL: http://java-service:8081
      PORT: "8080"
      SCOPE: ${SCOPE:-development}
      # ── OpenTelemetry (manual SDK) ────────────────────────────────────────
      OTEL_SERVICE_NAME: wcs-go-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_COLLECTOR_URL:-http://localhost:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${SCOPE:-development}
    depends_on:
      - java-service
    restart: on-failure

volumes:
  mysql_data:
