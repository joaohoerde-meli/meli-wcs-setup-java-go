# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT ONLY
#
# This file is NOT used in Fury/production. On Fury:
#   - MySQL is provisioned via Fury Database service
#   - Secrets (DB password) are injected by Fury Secrets at runtime
#   - OTel collector is provided by the Fury platform (no sidecar needed)
#   - Services are deployed as independent Fury applications
#
# To run locally:
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: wcs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wcs_db
      MYSQL_USER: wcs_user
      MYSQL_PASSWORD: wcs_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # OTel collector — local dev only.
  # On Fury, the platform collects traces/metrics automatically.
  # Remove this service when deploying to Fury.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: wcs-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  java-service:
    build:
      context: ./java-service
      dockerfile: Dockerfile
    container_name: wcs-java-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wcs_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: wcs_user
      # TODO (Fury): SPRING_DATASOURCE_PASSWORD will be injected by Fury Secrets
      # at runtime — do NOT hardcode this in production.
      SPRING_DATASOURCE_PASSWORD: wcs_pass
      SPRING_PROFILES_ACTIVE: ${SCOPE:-development}
      OTEL_SERVICE_NAME: wcs-java-service
      # Local dev: point to the otel-collector container.
      # On Fury: remove this — the platform injects the correct endpoint.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${SCOPE:-development}
      # Production: set OTEL_TRACES_SAMPLER=parentbased_traceidratio and OTEL_TRACES_SAMPLER_ARG=0.1
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-always_on}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-}
      OTEL_INSTRUMENTATION_SPRING_WEBMVC_ENABLED: "true"
      OTEL_INSTRUMENTATION_JDBC_ENABLED: "true"
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: on-failure

  go-service:
    build:
      context: ./go-service
      dockerfile: Dockerfile
    container_name: wcs-go-service
    ports:
      - "8080:8080"
    environment:
      JAVA_SERVICE_URL: http://java-service:8081
      PORT: "8080"
      SCOPE: ${SCOPE:-development}
      OTEL_SERVICE_NAME: wcs-go-service
      # Local dev: point to the otel-collector container.
      # On Fury: remove this — the platform injects the correct endpoint.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${SCOPE:-development}
      # Production: set OTEL_TRACES_SAMPLER=parentbased_traceidratio and OTEL_TRACES_SAMPLER_ARG=0.1
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-always_on}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-}
    depends_on:
      - java-service
      - otel-collector
    restart: on-failure

volumes:
  mysql_data:
